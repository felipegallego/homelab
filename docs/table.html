<script>
fetch('../data/apps.json')
  .then(response => response.json())
  .then(data => {
    const table = document.querySelector("#apps tbody");

    data.forEach(app => {
      const row = `
        <tr>
          <td>${app.name}</td>
          <td>${app.branch}</td>
          <td>${app.priority}</td>
          <td>${app.dev_order}</td>
          <td>${app.category}</td>
        </tr>
      `;
      table.innerHTML += row;
    });
  });
</script>
